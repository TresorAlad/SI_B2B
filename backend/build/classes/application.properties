spring.application.name=b2b

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/b2b}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgrespw}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

logging.level.root=WARN
logging.level.com.person.b2b=INFO

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

jwt.secret=${JWT_SECRET:change-me-in-production-use-at-least-32-characters-long-secret-key}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

app.admin.email=${APP_ADMIN_EMAIL:admin@b2b.hunt}
app.admin.password=${APP_ADMIN_PASSWORD:Admin@2026}
app.admin.name=${APP_ADMIN_NAME:Administrateur B2B}
