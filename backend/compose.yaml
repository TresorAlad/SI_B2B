services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=b2b
      - POSTGRES_PASSWORD=postgrespw
      - POSTGRES_USER=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: maven:3.9.4-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./:/app
      - ~/.m2:/root/.m2
    command: sh -c "mvn -DskipTests clean package && java -jar target/b2b-0.0.1-SNAPSHOT.jar"
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/b2b
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgrespw
      - JWT_SECRET=change-me-in-production-use-at-least-32-characters-long-secret-key
      - JWT_EXPIRATION_MS=86400000
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      - postgres

volumes:
  postgres-data:
