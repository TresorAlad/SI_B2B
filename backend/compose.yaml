services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=b2b
      - POSTGRES_PASSWORD=postgrespw
      - POSTGRES_USER=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: maven:3.9.4-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./:/app
      - ~/.m2:/root/.m2
    command: sh -c "mvn -DskipTests clean package && java -jar target/b2b-0.0.1-SNAPSHOT.jar"
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=b2b
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ep-curly-wildflower-aquqsu2j-pooler.c-8.us-east-1.aws.neon.tech/b2b?sslmode=require&channel_binding=require
      - SPRING_DATASOURCE_USERNAME=neondb_owner
      - SPRING_DATASOURCE_PASSWORD=npg_cjpM9bTz0Eqa
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=false
      - SPRING_SERVLET_MULTIPART_ENABLED=true
      - SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE=10MB
      - SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE=15MB
      - JWT_SECRET=hjh_kjoijoi_65465_6DYFDKFIYRFUYG
      - JWT_EXPIRATION_MS=86400000
    depends_on:
      - postgres

volumes:
  postgres-data:
