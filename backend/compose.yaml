services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_DB=b2b
      - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-postgrespw}
      - POSTGRES_USER=${SPRING_DATASOURCE_USERNAME:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Pas de ports exposés : accessible uniquement par le backend via le réseau Docker

  backend:
    image: maven:3.9.4-eclipse-temurin-21
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - ~/.m2:/root/.m2
    command: sh -c "mvn -DskipTests clean package && java -jar build/b2b-0.0.1-SNAPSHOT.jar"
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/b2b
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-postgrespw}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      - postgres

volumes:
  postgres-data:
