name: b2b

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_DB=b2b
      - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-postgrespw}
      - POSTGRES_USER=${SPRING_DATASOURCE_USERNAME:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-postgres} -d b2b"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: maven:3.9.4-eclipse-temurin-21
    restart: unless-stopped
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./:/app
      - ~/.m2:/root/.m2
    command: sh -c "mvn -DskipTests package -q && java -jar build/b2b-0.0.1-SNAPSHOT.jar"
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/b2b
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-postgrespw}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-https://sib2b.vercel.app,http://localhost:5173,http://localhost:5174}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
    name: b2b_postgres_data
